services:
  - type: web
    name: bizreplyai-api
    runtime: node
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build && pnpm prisma:migrate && pnpm prisma:seed
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bizreplyai-db
          property: connectionString
      - key: DB_CONNECTION_LIMIT
        value: "3"
      - key: DB_POOL_TIMEOUT_SECONDS
        value: "30"
      - key: DB_CONNECT_TIMEOUT_SECONDS
        value: "15"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: WHATSAPP_PROVIDER_MODE
        value: mock
      - key: ENABLE_DEV_TOOLS
        value: "false"
      - key: META_WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: META_WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: META_WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: META_WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_API_VERSION
        value: v20.0

databases:
  - name: bizreplyai-db
    databaseName: bizreplyai
    plan: basic-256mb
