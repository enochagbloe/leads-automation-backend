services:
  - type: web
    name: bizreplyai-api
    runtime: node
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build && pnpm prisma:migrate && pnpm prisma:seed
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bizreplyai-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: bizreplyai-db
    databaseName: bizreplyai
    plan: basic-256mb
